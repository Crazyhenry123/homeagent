services:
  api:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-local}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-local}
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - BEDROCK_MODEL_ID=us.anthropic.claude-opus-4-6-v1
      - SYSTEM_PROMPT=You are a helpful family assistant. Be warm, friendly, and supportive.
      - ADMIN_INVITE_CODE=FAMILY
      - USE_AGENT_ORCHESTRATOR=true
      - HEALTH_EXTRACTION_ENABLED=true
      - HEALTH_EXTRACTION_MODEL_ID=us.anthropic.claude-haiku-4-5-20251001-v1:0
      - S3_HEALTH_DOCUMENTS_BUCKET=health-documents
      - S3_ENDPOINT=http://minio:9000
      - VOICE_ENABLED=true
      - VOICE_MODEL_ID=amazon.nova-sonic-v1:0
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID:-}
      - COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID:-}
      - COGNITO_REGION=${COGNITO_REGION:-us-east-1}
      - SES_ENABLED=false
      - SES_FROM_EMAIL=
    depends_on:
      dynamodb-local:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000/shell/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=local
      - MINIO_ROOT_PASSWORD=locallocal
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 local locallocal;
      mc mb --ignore-existing local/health-documents;
      exit 0;
      "
